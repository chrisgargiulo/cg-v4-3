<script type="text/javascript" src="js/jquery.js"></script>		
<script type="text/javascript" src="js/jquery.easing.js"></script>
<script type="text/javascript">
	$(document).ready(function() {
		
		// JQUERY ANIMATE TO ANCHOR WITH EASING
		$('ul.nav a, a.bnav').bind('click',function(event){
			var $anchor = $(this);
			$('html, body').stop().animate({
				scrollTop: $($anchor.attr('href')).offset().top -36
			}, 1500,'easeInOutExpo');
			event.preventDefault();
		});
        
        // JQUERY NAV TOGGLE 
		$('#cgmenu a').click(function(){
			$('#utilitymenu ul').slideToggle(function(){
				if ($(this).css('display') == 'none') {
					$(this).removeClass('show').addClass('hide').removeAttr('style')
				} else if ($(this).css('display') == 'block') {
					$(this).removeClass('hide').addClass('show').removeAttr('style');
				}
			});
		})
        
        // LOAD WORK THUMBGRID CONTENT
        $('.thumbgrid').load('index.html #work');
		
	});
</script>
